# docker-compose 配置：用于本地或服务器一键启动后端服务
version: "3.9"

services:
  # research：自动科研助手 FastAPI 服务
  research:
    # 使用当前目录的 Dockerfile 进行构建
    build: .
    # 将容器内 8000 端口映射到主机 8000 端口
    ports:
      - "8000:8000"
    # 从项目根目录的 .env 加载环境变量（LLM_BASE_URL / LLM_API_KEY 等）
    env_file: .env
    # 将持久化数据与日志目录挂载到主机，避免容器重建后丢失
    volumes:
      - ./app/data:/app/app/data
      - ./logs:/app/logs
    # 容器异常退出时自动重启（除非手动停止）
    restart: unless-stopped
